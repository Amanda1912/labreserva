<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LabReserva</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            cursor: pointer;
            background: #222;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .reserva {
            background: #eee;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LabReserva</h1>
    <p>Sistema de reserva de laboratórios da faculdade.</p>

    <label>Nome do professor:</label>
    <input type="text" id="professor">

    <label>E-mail:</label>
    <input type="email" id="email">

    <label>Disciplina:</label>
    <input type="text" id="disciplina">

    <label>Laboratório:</label>
    <select id="laboratorio">
        <option value="">Selecione</option>
        {% for lab in laboratorios %}
            <option value="{{ lab }}">{{ lab }}</option>
        {% endfor %}
    </select>

    <label>Data:</label>
    <input type="date" id="data">

    <label>Horário disponível:</label>
    <select id="horario">
        <option value="">Selecione uma data e laboratório</option>
    </select>

    <button onclick="reservar()">Reservar laboratório</button>

    <h2>Reservas cadastradas</h2>
    <div id="listaReservas"></div>
</div>

<script>
    const laboratorio = document.getElementById("laboratorio");
    const data = document.getElementById("data");
    const horario = document.getElementById("horario");

    laboratorio.addEventListener("change", carregarHorarios);
    data.addEventListener("change", carregarHorarios);

    async function carregarHorarios() {
        if (!laboratorio.value || !data.value) {
            return;
        }

        const resposta = await fetch(`/horarios-disponiveis?laboratorio=${laboratorio.value}&data=${data.value}`);
        const horarios = await resposta.json();

        horario.innerHTML = "";

        if (horarios.length === 0) {
            horario.innerHTML = "<option>Nenhum horário disponível</option>";
            return;
        }

        horarios.forEach(h => {
            const option = document.createElement("option");
            option.value = h;
            option.textContent = h;
            horario.appendChild(option);
        });
    }

    async function reservar() {
        const dados = {
            professor: document.getElementById("professor").value,
            email: document.getElementById("email").value,
            disciplina: document.getElementById("disciplina").value,
            laboratorio: laboratorio.value,
            data: data.value,
            horario: horario.value
        };

        const resposta = await fetch("/reservar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dados)
        });

        const resultado = await resposta.json();

        if (resposta.ok) {
            alert(resultado.mensagem);
            carregarHorarios();
            carregarReservas();
        } else {
            alert(resultado.erro);
        }
    }

    async function carregarReservas() {
        const resposta = await fetch("/reservas");
        const reservas = await resposta.json();

        const lista = document.getElementById("listaReservas");
        lista.innerHTML = "";

        reservas.forEach(r => {
            const div = document.createElement("div");
            div.className = "reserva";
            div.innerHTML = `
                <strong>${r.laboratorio}</strong><br>
                Data: ${r.data}<br>
                Horário: ${r.horario}<br>
                Professor: ${r.professor}<br>
                Disciplina: ${r.disciplina}
            `;
            lista.appendChild(div);
        });
    }

    carregarReservas();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LabReserva</title>

    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #e0e9f1;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar{
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .navbar .logo a {
            text-decoration: none;
            color: #111;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .navbar .nav-links a:hover {
            color: #3a7f88;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            margin-top: 100px;
            margin-bottom: 40px;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 38px;
            text-align: center;
            font-weight: 400;
            color: #000;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #444;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .left-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e1e5eb;
            background-color: #f4f6f8;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        .has-icon {
            padding-left: 40px;
        }

        input:focus, select:focus {
            border-color: #00a8cc;
            box-shadow: 0 0 10px rgba(0, 168, 204, 0.3);
            background-color: #ffffff;
        }

        input::placeholder, select::placeholder {
            color: #999;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3b8086; /* Cor verde/azulada da imagem */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #2c6368;
        }
        
        button:active {
            transform: scale(0.98);
        }

        h2 {
            font-size: 20px;
            margin-top: 40px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .reserva {
            background: #f8fafc;
            border-left: 4px solid #3b8086;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }


    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/2926/2926284.png" alt="Logo" width="30">
        </div>
        <div class="nav-links">
            <a href="#">Início</a>
            <a href="#">Minhas Reservas</a>
         </div>
    </nav>

<div class="container">
    <h1>LabReserva</h1>
    <p>Sistema de reserva de laboratórios da faculdade.</p>

    <div class="input-group">
        <label>Nome do professor:</label>
        <div class="input-wrapper">
            <i class="fa-regular fa-user left-icon"></i>
            <input type="text" id="professor" class="has-icon" placeholder="digite seu nome completo">
        </div>
    </div>

    <div class="input-group">
        <label>Nome do professor:</label>
        <div class="input-wrapper">
            <i class="fa-regular fa-user left-icon"></i>
            <input type="text" id="professor" class="has-icon" placeholder="digite seu nome completo">
        </div>
    </div>

    <div class="input-group">
        <label>Disciplina:</label>
        <div class="input-wrapper">
            <i class="fa-solid fa-book-open left-icon"></i>
            <input type="text" id="disciplina" class="has-icon">
        </div>
    </div>

    <div class="input-group">
        <label>Laboratório:</label>
        <div class="input-wrapper">
            <select id="laboratorio">
                <option value="">Selecione</option>
                {% for lab in laboratorios %}
                    <option value="{{ lab }}">{{ lab }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

   <div class="input-group">
        <label>Data:</label>
        <div class="input-wrapper">
            <input type="date" id="data">
        </div>
    </div>

   <div class="input-group">
        <label>Horário disponível:</label>
        <div class="input-wrapper">
            <select id="horario">
                <option value="">Selecione uma data e laboratório</option>
            </select>
        </div>
    </div>

    <button onclick="reservar()">Reservar laboratório</button>

    <h2>Reservas cadastradas</h2>
    <div id="listaReservas"></div>
</div>

<script>
    const laboratorio = document.getElementById("laboratorio");
    const data = document.getElementById("data");
    const horario = document.getElementById("horario");

    laboratorio.addEventListener("change", carregarHorarios);
    data.addEventListener("change", carregarHorarios);

    async function carregarHorarios() {
        if (!laboratorio.value || !data.value) {
            return;
        }

        const resposta = await fetch(`/horarios-disponiveis?laboratorio=${laboratorio.value}&data=${data.value}`);
        const horarios = await resposta.json();

        horario.innerHTML = "";

        if (horarios.length === 0) {
            horario.innerHTML = "<option>Nenhum horário disponível</option>";
            return;
        }

        horarios.forEach(h => {
            const option = document.createElement("option");
            option.value = h;
            option.textContent = h;
            horario.appendChild(option);
        });
    }

    async function reservar() {
        const dados = {
            professor: document.getElementById("professor").value,
            email: document.getElementById("email").value,
            disciplina: document.getElementById("disciplina").value,
            laboratorio: laboratorio.value,
            data: data.value,
            horario: horario.value
        };

        const resposta = await fetch("/reservar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(dados)
        });

        const resultado = await resposta.json();

        if (resposta.ok) {
            alert(resultado.mensagem);
            carregarHorarios();
            carregarReservas();
        } else {
            alert(resultado.erro);
        }
    }

    async function carregarReservas() {
        const resposta = await fetch("/reservas");
        const reservas = await resposta.json();

        const lista = document.getElementById("listaReservas");
        lista.innerHTML = "";

        reservas.forEach(r => {
            const div = document.createElement("div");
            div.className = "reserva";
            div.innerHTML = `
                <strong>${r.laboratorio}</strong><br>
                Data: ${r.data}<br>
                Horário: ${r.horario}<br>
                Professor: ${r.professor}<br>
                Disciplina: ${r.disciplina}
            `;
            lista.appendChild(div);
        });
    }

    carregarReservas();
</script>

</body>
</html>
